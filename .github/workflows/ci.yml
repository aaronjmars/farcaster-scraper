name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Syntax check (ESM sources)
        run: |
          for f in $(find src -name '*.js'); do
            echo "node --check $f"
            node --check "$f"
          done
